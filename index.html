
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>¿Terraza hoy?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg-from:#faf6ee;--bg-to:#f0d98a;--text:#1a1612;--muted:rgba(26,22,18,0.42);--accent:#f0d98a}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg-from);color:var(--text);min-height:100dvh;overflow-x:hidden}

/* ── MODAL ── */
#city-modal{position:fixed;inset:0;z-index:100;background:rgba(26,22,18,.5);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
#city-modal.open{opacity:1;pointer-events:all}
.modal-sheet{width:100%;max-width:480px;background:#faf6ee;border-radius:22px 22px 0 0;padding:24px 22px 48px;transform:translateY(100%);transition:transform .35s cubic-bezier(.22,1,.36,1)}
#city-modal.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:34px;height:3px;background:rgba(26,22,18,.14);border-radius:2px;margin:0 auto 22px}
.modal-title{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;margin-bottom:16px}
.city-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:20px}
.city-btn{font-family:'DM Sans',sans-serif;font-size:13px;padding:11px 14px;border-radius:11px;border:1px solid rgba(26,22,18,.11);background:transparent;color:var(--text);cursor:pointer;text-align:left;display:flex;align-items:center;gap:7px;transition:background .15s,border-color .15s}
.city-btn:hover{background:rgba(26,22,18,.06);border-color:rgba(26,22,18,.22)}
.city-btn.active{background:rgba(26,22,18,.08);border-color:rgba(26,22,18,.3);font-weight:500}
.city-btn .cf{font-size:16px;flex-shrink:0}
.modal-geo-btn{width:100%;padding:13px;border-radius:11px;border:1px solid rgba(26,22,18,.15);background:var(--text);color:var(--bg-from);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:opacity .2s}
.modal-geo-btn:hover{opacity:.85}
.modal-geo-btn.loading{opacity:.55;pointer-events:none}

/* ── HERO ── */
#hero{min-height:100dvh;display:flex;flex-direction:column;padding:env(safe-area-inset-top,20px) 28px 28px;background:linear-gradient(160deg,var(--bg-from) 0%,var(--bg-to) 100%);transition:background .8s ease}

.topbar{display:flex;align-items:center;justify-content:space-between;padding-top:18px;opacity:0;animation:fu .5s .08s forwards}
.city-trigger{display:flex;align-items:center;gap:5px;cursor:pointer;background:none;border:none;padding:0;font-family:'DM Sans',sans-serif}
.city-trigger svg{width:12px;height:12px;opacity:.38;flex-shrink:0}
#city-name{font-size:12px;letter-spacing:.07em;color:var(--muted);text-transform:uppercase}
.city-chevron{width:14px;height:14px;opacity:.35;transition:transform .2s}
.city-trigger:hover .city-chevron{opacity:.6}

/* animated weather icons */
.icon-wrap{margin-top:22px;width:52px;height:52px;opacity:0;animation:fu .5s .16s forwards}
.w-icon{width:52px;height:52px;position:relative}

/* sun */
.sun-body{fill:none;stroke:var(--text);stroke-width:1.6;stroke-linecap:round}
.sun-circle{animation:sun-pulse 3s ease-in-out infinite}
@keyframes sun-pulse{0%,100%{r:8}50%{r:9}}
.sun-rays{animation:sun-spin 12s linear infinite;transform-origin:21px 21px}
@keyframes sun-spin{to{transform:rotate(360deg)}}

/* moon */
.moon-path{fill:none;stroke:var(--text);stroke-width:1.6;stroke-linecap:round;animation:moon-rock 4s ease-in-out infinite;transform-origin:21px 21px}
@keyframes moon-rock{0%,100%{transform:rotate(0deg)}50%{transform:rotate(8deg)}}

/* cloud */
.cloud-body{fill:none;stroke:var(--text);stroke-width:1.6;stroke-linecap:round;animation:cloud-drift 5s ease-in-out infinite}
@keyframes cloud-drift{0%,100%{transform:translateX(0)}50%{transform:translateX(3px)}}

/* partly cloudy: sun behind cloud */
.pc-sun{fill:none;stroke:var(--text);stroke-width:1.5;stroke-linecap:round;opacity:.55;animation:sun-spin 14s linear infinite;transform-origin:14px 16px}
.pc-cloud{fill:none;stroke:var(--text);stroke-width:1.6;stroke-linecap:round;animation:cloud-drift 5s ease-in-out infinite}

/* rain drops */
.rain-drop{fill:none;stroke:var(--text);stroke-width:1.5;stroke-linecap:round;animation:rain-fall 1.1s linear infinite}
.rain-drop:nth-child(2){animation-delay:.18s}
.rain-drop:nth-child(3){animation-delay:.36s}
.rain-drop:nth-child(4){animation-delay:.54s}
@keyframes rain-fall{0%{opacity:0;transform:translateY(-4px)}40%{opacity:1}100%{opacity:0;transform:translateY(6px)}}

/* snow */
.snow-flake{animation:snow-fall 1.8s ease-in-out infinite}
.snow-flake:nth-child(2){animation-delay:.4s}.snow-flake:nth-child(3){animation-delay:.8s}
@keyframes snow-fall{0%{opacity:0;transform:translateY(-3px)}50%{opacity:1}100%{opacity:0;transform:translateY(5px)}}

/* fog */
.fog-line{fill:none;stroke:var(--text);stroke-width:1.5;stroke-linecap:round;animation:fog-pulse 2.5s ease-in-out infinite}
.fog-line:nth-child(2){animation-delay:.4s}.fog-line:nth-child(3){animation-delay:.8s}
@keyframes fog-pulse{0%,100%{opacity:.25;transform:translateX(0)}50%{opacity:.7;transform:translateX(3px)}}

/* storm */
.lightning{fill:none;stroke:var(--text);stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;animation:flash 2s ease-in-out infinite}
@keyframes flash{0%,100%{opacity:.3}45%,55%{opacity:1}}

.hero-copy{margin-top:auto}
.question{font-size:14px;color:var(--muted);margin-bottom:5px;opacity:0;animation:fu .5s .26s forwards}
.verdict{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(50px,15.5vw,76px);line-height:.92;letter-spacing:-.025em;opacity:0;animation:fu .6s .33s forwards}
.outline{-webkit-text-stroke:2px var(--text);color:transparent}
.subline{margin-top:12px;font-size:14px;color:var(--muted);line-height:1.45;max-width:300px;opacity:0;animation:fu .5s .42s forwards}

/* context tag + share */
.ctx-row{display:none;align-items:center;gap:8px;margin-top:9px;opacity:0;animation:fu .5s .48s forwards}
.ctx-row.visible{display:flex}
.ctx-tag{font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;background:rgba(26,22,18,.08);border-radius:100px;padding:5px 12px}
.share-btn{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;border:1px solid rgba(26,22,18,.14);background:transparent;cursor:pointer;transition:background .15s;flex-shrink:0}
.share-btn:hover{background:rgba(26,22,18,.08)}
.share-btn svg{width:15px;height:15px;opacity:.6}

.temp-row{margin-top:24px;display:flex;align-items:flex-end;justify-content:space-between;border-top:1px solid rgba(26,22,18,.1);padding-top:14px;opacity:0;animation:fu .5s .52s forwards}
#temp-value{font-family:'Syne',sans-serif;font-weight:700;font-size:clamp(52px,17vw,90px);line-height:1;letter-spacing:-.04em}
.temp-meta{text-align:right;padding-bottom:6px}
.temp-meta span{display:block;font-size:12px;color:var(--muted);line-height:1.6}

/* WEEK — single, with tap-to-phrase */
.week-row{display:flex;margin-top:18px;border-top:1px solid rgba(26,22,18,.07);padding-top:13px;opacity:0;animation:fu .5s .6s forwards}
.wd{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:4px 0;cursor:pointer;border-radius:10px;transition:background .15s;position:relative}
.wd+.wd{border-left:1px solid rgba(26,22,18,.07)}
.wd:hover{background:rgba(26,22,18,.04)}
.wd-name{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);transition:color .2s}
.wd-icon-wrap{font-size:16px;line-height:1}
.wd-dot{width:6px;height:6px;border-radius:50%}
.wd-dot.yes{background:#2e7d32}.wd-dot.maybe{background:#d4930a}.wd-dot.no{background:#b71c1c}
.wd-temp{font-family:'Syne',sans-serif;font-size:13px;font-weight:700}
.wd.today .wd-name{color:var(--text)}

/* day phrase tooltip */
.day-phrase{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:var(--text);color:var(--bg-from);
  padding:20px 24px 36px;border-radius:20px 20px 0 0;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.22,1,.36,1);
  font-size:14px;line-height:1.5;text-align:center
}
.day-phrase.open{transform:translateY(0)}
.dp-city{font-size:11px;opacity:.45;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.dp-verdict{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:6px}
.dp-reason{opacity:.65;margin-bottom:16px}
.dp-close{font-size:12px;opacity:.4;cursor:pointer;text-transform:uppercase;letter-spacing:.1em}

.scroll-hint{display:flex;flex-direction:column;align-items:center;gap:4px;margin-top:18px;opacity:0;animation:fu .5s .72s forwards;cursor:pointer}
.scroll-hint span{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.scroll-hint svg{width:14px;height:14px;opacity:.3;animation:bounce 1.8s 1.6s infinite}

/* ── DETAIL ── */
#detail{background:var(--text);color:var(--bg-from);padding:40px 28px 60px}
.sec-lbl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;opacity:.3;margin-bottom:14px}

.dl-wrap{margin-bottom:38px}
.dl-header{display:flex;justify-content:space-between;font-size:12px;opacity:.55;margin-bottom:9px}
.dl-track{height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-bottom:5px;position:relative}
.dl-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 1s ease}
.sun-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);position:absolute;top:50%;transform:translate(-50%,-50%);box-shadow:0 0 6px var(--accent)}
.dl-labels{display:flex;justify-content:space-between;font-size:10px;opacity:.26;text-transform:uppercase;letter-spacing:.05em}

.cond-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:38px}
.cc{background:rgba(255,255,255,.06);border-radius:13px;padding:13px;border:1px solid rgba(255,255,255,.07)}
.cc-lbl{font-size:10px;opacity:.35;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.cc-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;line-height:1}
.cc-sub{font-size:11px;opacity:.35;margin-top:3px}

.hourly{display:flex;gap:9px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.hourly::-webkit-scrollbar{display:none}
.hi{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:46px}
.hi-time{font-size:10px;opacity:.3;text-transform:uppercase}
.hi-temp{font-family:'Syne',sans-serif;font-size:13px;font-weight:700}
.hi-rain{font-size:10px;color:#7cb4e8}
.hi.now .hi-time{opacity:1;color:var(--accent)}

/* loading */
#loading{position:fixed;inset:0;z-index:90;background:var(--bg-from);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:opacity .4s}
#loading.hidden{opacity:0;pointer-events:none}
.spinner{width:24px;height:24px;border:2px solid rgba(26,22,18,.1);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite}
#loading p{font-size:13px;color:var(--muted)}
@keyframes spin{to{transform:rotate(360deg)}}
#err-bar{display:none;position:fixed;top:0;left:0;right:0;z-index:200;background:#8b1a1a;color:#fff;font-size:13px;padding:14px 20px;text-align:center;line-height:1.4}
@keyframes fu{from{opacity:0;transform:translateY(11px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p id="loading-txt">Localizando…</p></div>
<div id="err-bar"></div>

<!-- city modal -->
<div id="city-modal" onclick="maybeCloseModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <p class="modal-title">¿Dónde estás?</p>
    <div class="city-grid" id="city-grid"></div>
    <button class="modal-geo-btn" id="geo-btn" onclick="tryGeo()">
      <svg viewBox="0 0 16 16" fill="none" width="15" height="15"><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Usar mi ubicación actual
    </button>
  </div>
</div>

<!-- day phrase sheet -->
<div id="day-phrase" class="day-phrase" onclick="closeDayPhrase()">
  <p class="dp-city" id="dp-day"></p>
  <p class="dp-verdict" id="dp-verdict"></p>
  <p class="dp-reason" id="dp-reason"></p>
  <p class="dp-close">Cerrar</p>
</div>

<!-- HERO -->
<section id="hero">
  <div class="topbar">
    <button class="city-trigger" onclick="openModal()">
      <svg viewBox="0 0 16 16" fill="none"><path d="M8 1C5.24 1 3 3.24 3 6c0 3.75 5 9 5 9s5-5.25 5-9c0-2.76-2.24-5-5-5zm0 6.75A1.75 1.75 0 1 1 8 4.25a1.75 1.75 0 0 1 0 3.5z" fill="currentColor"/></svg>
      <span id="city-name">–</span>
      <svg class="city-chevron" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <div class="icon-wrap" id="icon-wrap"><!-- JS --></div>

  <div class="hero-copy">
    <p class="question">¿Nos tomamos una caña?</p>
    <h1 class="verdict" id="verdict-text">–</h1>
    <p class="subline" id="subline-text"> </p>
    <div class="ctx-row" id="ctx-row">
      <span class="ctx-tag" id="ctx-tag"></span>
      <button class="share-btn" onclick="shareApp()" title="Compartir por WhatsApp">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.52 3.48A11.93 11.93 0 0 0 12 0C5.37 0 0 5.37 0 12a11.93 11.93 0 0 0 1.64 6.06L0 24l6.12-1.6A11.94 11.94 0 0 0 12 24c6.63 0 12-5.37 12-12a11.93 11.93 0 0 0-3.48-8.52zM12 22a9.94 9.94 0 0 1-5.08-1.39l-.36-.22-3.74.98.99-3.64-.24-.38A9.95 9.95 0 0 1 2 12C2 6.48 6.48 2 12 2s10 4.48 10 10-4.48 10-10 10zm5.47-7.37c-.3-.15-1.77-.87-2.04-.97s-.47-.15-.67.15-.77.97-.94 1.17-.35.22-.65.07a8.14 8.14 0 0 1-2.39-1.48 8.95 8.95 0 0 1-1.65-2.06c-.17-.3 0-.46.13-.6.12-.13.3-.34.44-.51.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.08-.15-.67-1.6-.91-2.19-.24-.57-.48-.49-.67-.5l-.57-.01c-.2 0-.52.07-.79.37s-1.04 1.01-1.04 2.46 1.06 2.86 1.21 3.06c.14.2 2.08 3.18 5.04 4.46.7.3 1.25.48 1.67.62.7.22 1.34.19 1.84.11.56-.08 1.73-.7 1.97-1.38.24-.68.24-1.26.17-1.38-.07-.12-.27-.19-.57-.33z" fill="currentColor"/>
        </svg>
      </button>
    </div>

    <div class="temp-row">
      <div id="temp-value">–°</div>
      <div class="temp-meta">
        <span id="rain-text"> </span>
        <span id="desc-text"> </span>
        <span id="wind-text"> </span>
      </div>
    </div>

    <div class="week-row" id="week-row"></div>

    <div class="scroll-hint" onclick="document.getElementById('detail').scrollIntoView({behavior:'smooth'})">
      <span>Más info</span>
      <svg viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3.5 8.5 8 13l4.5-4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>
</section>

<section id="detail">
  <p class="sec-lbl">Luz del día</p>
  <div class="dl-wrap">
    <div class="dl-header">
      <span>☀ <span id="sunrise-t">–</span></span>
      <span id="dl-hours">–</span>
      <span><span id="sunset-t">–</span> ☾</span>
    </div>
    <div class="dl-track">
      <div class="dl-fill" id="dl-fill" style="width:0%"></div>
      <div class="sun-dot" id="sun-dot" style="left:0%"></div>
    </div>
    <div class="dl-labels"><span>Amanecer</span><span>Ahora</span><span>Anochecer</span></div>
  </div>

  <p class="sec-lbl">Condiciones ahora</p>
  <div class="cond-grid">
    <div class="cc"><div class="cc-lbl">Lluvia hoy</div><div class="cc-val" id="c-rain">–</div><div class="cc-sub" id="c-rain-s">–</div></div>
    <div class="cc"><div class="cc-lbl">Viento ahora</div><div class="cc-val" id="c-wind">–</div><div class="cc-sub">km/h</div></div>
    <div class="cc"><div class="cc-lbl">Temperatura</div><div class="cc-val" id="c-temp">–</div><div class="cc-sub" id="c-temp-s">–</div></div>
    <div class="cc"><div class="cc-lbl">Viento máx.</div><div class="cc-val" id="c-wmax">–</div><div class="cc-sub">km/h hoy</div></div>
  </div>

  <p class="sec-lbl">Por horas — hoy</p>
  <div class="hourly" id="hourly"></div>
</section>

<script>
// ── CITIES ────────────────────────────────────────────────────────
const CITIES=[
  {name:'Madrid',lat:40.4168,lon:-3.7038,flag:'🏙'},
  {name:'Barcelona',lat:41.3851,lon:2.1734,flag:'🌊'},
  {name:'Valencia',lat:39.4699,lon:-0.3763,flag:'🌴'},
  {name:'Sevilla',lat:37.3891,lon:-5.9845,flag:'☀️'},
  {name:'Málaga',lat:36.7213,lon:-4.4214,flag:'🍹'},
  {name:'Cádiz',lat:36.5297,lon:-6.2923,flag:'🌅'},
  {name:'Bilbao',lat:43.2630,lon:-2.9350,flag:'🌧'},
  {name:'San Sebastián',lat:43.3183,lon:-1.9812,flag:'🎣'},
  {name:'Zaragoza',lat:41.6488,lon:-0.8891,flag:'🏛'},
  {name:'Granada',lat:37.1773,lon:-3.5986,flag:'🏔'},
  {name:'Alicante',lat:38.3452,lon:-0.4810,flag:'🏖'},
  {name:'Valdepeñas',lat:38.7631,lon:-3.3842,flag:'🍷'},
];

// ── FESTIVOS ──────────────────────────────────────────────────────
const FESTIVOS=new Set([
  '2025-01-01','2025-01-06','2025-04-17','2025-04-18','2025-05-01',
  '2025-08-15','2025-10-12','2025-11-01','2025-12-06','2025-12-08','2025-12-25',
  '2026-01-01','2026-01-06','2026-04-02','2026-04-03','2026-05-01',
  '2026-08-15','2026-10-12','2026-11-01','2026-12-06','2026-12-08','2026-12-25'
]);

const cache={};
let activeCity=null;

// ── ANIMATED SVG ICONS ────────────────────────────────────────────
function makeSunSVG(){
  return`<svg class="w-icon" viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
    <g class="sun-rays">
      <line x1="21" y1="3" x2="21" y2="7" class="sun-body"/>
      <line x1="21" y1="35" x2="21" y2="39" class="sun-body"/>
      <line x1="3" y1="21" x2="7" y2="21" class="sun-body"/>
      <line x1="35" y1="21" x2="39" y2="21" class="sun-body"/>
      <line x1="7.5" y1="7.5" x2="10.3" y2="10.3" class="sun-body"/>
      <line x1="31.7" y1="31.7" x2="34.5" y2="34.5" class="sun-body"/>
      <line x1="34.5" y1="7.5" x2="31.7" y2="10.3" class="sun-body"/>
      <line x1="10.3" y1="31.7" x2="7.5" y2="34.5" class="sun-body"/>
    </g>
    <circle class="sun-body sun-circle" cx="21" cy="21" r="8"/>
  </svg>`;
}
function makeMoonSVG(){
  return`<svg class="w-icon" viewBox="0 0 42 42" fill="none">
    <path class="moon-path" d="M27 31a13 13 0 0 1-9-22.4A10 10 0 1 0 27 31z"/>
  </svg>`;
}
function makeCloudSVG(){
  return`<svg class="w-icon" viewBox="0 0 42 42" fill="none">
    <g class="cloud-body">
      <path d="M10 28a8 8 0 0 1 0-16 8 8 0 0 1 15.5-2A7 7 0 1 1 33 28H10z" class="sun-body cloud-body"/>
    </g>
  </svg>`;
}
function makePartlyCloudySVG(){
  return`<svg class="w-icon" viewBox="0 0 42 42" fill="none">
    <g class="pc-sun" style="transform-origin:14px 16px">
      <circle cx="14" cy="16" r="5" class="sun-body" style="stroke-width:1.4"/>

function getIcon(wmo, hour){
  const isDay=hour>=6&&hour<20;
  if(wmo===0) return isDay?makeSunSVG():makeMoonSVG();
  if(wmo<=2)  return makePartlyCloudySVG();
  if(wmo===3) return makeCloudSVG();
  if(wmo<=48) return makeFogSVG();
  if(wmo<=65||wmo<=82) return makeRainSVG();
  if(wmo<=75) return makeSnowSVG();
  return makeStormSVG();
}

// ── WMO ───────────────────────────────────────────────────────────
function wmoEmoji(c){if(c===0)return'☀️';if(c<=2)return'⛅';if(c===3)return'☁️';if(c<=48)return'🌫';if(c<=55)return'🌦';if(c<=65)return'🌧';if(c<=75)return'❄️';if(c<=82)return'🌧';return'⛈';}
function wmoDesc(c){if(c===0)return'Despejado';if(c<=2)return'Parcialmente nublado';if(c===3)return'Nublado';if(c<=48)return'Niebla';if(c<=55)return'Llovizna';if(c<=65)return'Lluvia';if(c<=75)return'Nieve';if(c<=82)return'Chubascos';return'Tormenta';}

// ── SCORE ─────────────────────────────────────────────────────────
function calcScore(temp,rain,wind){let s=0;if(temp>=22)s+=3;else if(temp>=18)s+=2;else if(temp>=14)s+=1;if(rain<0.1)s+=3;else if(rain<0.5)s+=1;if(wind<15)s+=2;else if(wind<25)s+=1;return s;}
function getVerdict(temp,rain,wind){
  const s=calcScore(temp,rain,wind);
  if(rain>=1) return{key:'no',short:'No.',score:s};
  if(wind>=35)return{key:'no',short:'No.',score:s};
  if(temp<10) return{key:'no',short:'No.',score:s};
  if(s>=7)    return{key:'yes',short:'¡Sí!',score:s};
  if(s>=5)    return{key:'yes',short:'Venga.',score:s};
  if(s>=3)    return{key:'maybe',short:'Quizás.',score:s};
  return       {key:'no',short:'Hoy no.',score:s};
}

// context-specific copy that OVERRIDES reason when verdict is yes/maybe
const CTX_COPY={
  festivo_hoy:'Hoy es festivo. La caña no es opcional, es un deber cívico.',
  weekend:'Fin de semana y buen tiempo. Quien no salga que dé explicaciones.',
  festivo_manana:'Mañana es festivo. Esta caña cuenta doble en el karma cervecero.',
  vermut:'Hora del vermut. El sol + las 12h es una sincronía demasiado perfecta para ignorarla.',
  afterwork:'After work ideal. La terraza lleva horas esperándote. Ya tardas.',
};

function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

function getCopy(key, temp, rain, wind, hour){
  const tod= hour>=11&&hour<14?'vermut': hour>=17&&hour<21?'afterwork': hour>=6&&hour<11?'morning': 'night';
  let pool;
  if(key==='yes')       pool=COPY.yes[tod]||COPY.yes.generic;
  else if(key==='maybe'){
    if(rain>=0.1)       pool=COPY.maybe.cloudy;
    else if(wind>=25)   pool=COPY.maybe.wind;
    else if(temp<16)    pool=COPY.maybe.cold;
    else                pool=COPY.maybe.generic;
  } else {
    if(rain>=1)         pool=COPY.no.rain;
    else if(wind>=35)   pool=COPY.no.wind;
    else if(temp<10)    pool=COPY.no.cold;
    else                pool=COPY.no.generic;
  }
  return pick(pool);
}

function getCtx(key){
  if(key==='no')return null;
  const now=new Date(),h=now.getHours(),day=now.getDay();
  const todayS=toYMD(now),mS=toYMD(new Date(+now+864e5));
  if(FESTIVOS.has(todayS)) return{label:'Hoy es festivo 🎉',copy:CTX_COPY.festivo_hoy};
  if(day===0||day===6)     return{label:'Fin de semana ✌️',copy:CTX_COPY.weekend};
  if(FESTIVOS.has(mS))     return{label:'Mañana festivo 🔔',copy:CTX_COPY.festivo_manana};
  if(h>=11&&h<14)          return{label:'Hora del vermut 🍸',copy:CTX_COPY.vermut};
  if(h>=17&&h<21)          return{label:'After work 🍺',copy:CTX_COPY.afterwork};
  return null;
}

// per-day copy for the tap sheet
function getDayCopy(temp, rain, wind, label){
  const v=getVerdict(temp,rain,wind);
  const c=getCopy(v.key,temp,rain,wind,14); // use afternoon as reference for day forecast
  const icons={yes:'✅',maybe:'🤔',no:'❌'};
  return{verdict:icons[v.key]+' '+c.v, reason:c.r, key:v.key};
}

// ── THEME ─────────────────────────────────────────────────────────
function applyTheme(wmo,hour){
  const r=document.documentElement;
  let f,t;
  if(wmo>=51){f='#e8edf5';t='#b8c8de';}
  else if(wmo>=3){f='#f0eeea';t='#d4cfc6';}
  else if(hour<11){f='#fdfaf3';t='#f5e5a0';}
  else if(hour<19){f='#fef0c7';t='#e8b84b';}
  else{f='#f2ede4';t='#c9bfa8';}
  r.style.setProperty('--bg-from',f);
  r.style.setProperty('--bg-to',t);
}

// ── UTILS ─────────────────────────────────────────────────────────
function toYMD(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function shortDay(s,i){
  if(i===0)return'Hoy';if(i===1)return'Mañ.';
  return new Date(s+'T12:00:00').toLocaleDateString('es-ES',{weekday:'short'}).replace('.','').slice(0,3);
}

// ── DAY PHRASE SHEET ──────────────────────────────────────────────
let _dayData=null;
function openDayPhrase(label, temp, rain, wind){
  const dc=getDayCopy(temp,rain,wind,label);
  document.getElementById('dp-day').textContent=label;
  document.getElementById('dp-verdict').textContent=dc.verdict;
  document.getElementById('dp-reason').textContent=dc.reason;

function closeDayPhrase(){document.getElementById('day-phrase').classList.remove('open');}

// ── SHARE ─────────────────────────────────────────────────────────
function shareApp(){

// ── RENDER ────────────────────────────────────────────────────────
function render(meteo,sun,cityName){
  const hour=new Date().getHours();
  const todayStr=toYMD(new Date());
  let hi=meteo.hourly.time.findIndex(t=>t.startsWith(todayStr)&&new Date(t).getHours()===hour);
  if(hi<0)hi=0;

  const temp=Math.round(meteo.hourly.temperature_2m[hi]);
  const rain=meteo.hourly.precipitation[hi]??0;
  const wind=Math.round(meteo.hourly.windspeed_10m[hi]);
  const wmo =meteo.daily.weathercode[0];
  const v   =getVerdict(temp,rain,wind);
  const copy=getCopy(v.key,temp,rain,wind,hour);
  const ctx =getCtx(v.key);

  // apply context override if applicable
  const finalReason = ctx?ctx.copy:copy.r;

  document.getElementById('city-name').textContent=cityName.toUpperCase();

  // animated icon
  document.getElementById('icon-wrap').innerHTML=getIcon(wmo,hour);

  // verdict
  const vEl=document.getElementById('verdict-text');
  vEl.innerHTML='';
  const words=copy.v.split(' ');
  if(words.length>1){
    vEl.textContent=words.slice(0,-1).join(' ')+' ';
    const sp=document.createElement('span');sp.className='outline';sp.textContent=words[words.length-1];vEl.appendChild(sp);
  }else{vEl.textContent=copy.v;}
  document.getElementById('subline-text').textContent=finalReason;

  // context tag + share
  const ctxRow=document.getElementById('ctx-row');
  if(ctx){
    document.getElementById('ctx-tag').textContent=ctx.label;
    ctxRow.style.display='flex';ctxRow.classList.add('visible');
  }else{ctxRow.style.display='none';}

  // temp row
  document.getElementById('temp-value').textContent=temp+'°';
  document.getElementById('rain-text').textContent='Lluvia '+rain.toFixed(1)+' mm';
  document.getElementById('desc-text').textContent=wmoDesc(wmo);
  document.getElementById('wind-text').textContent='Viento '+wind+' km/h';

  applyTheme(wmo,hour);

  // conditions
  document.getElementById('c-rain').textContent=(meteo.daily.precipitation_sum[0]??0).toFixed(1)+' mm';
  document.getElementById('c-rain-s').textContent=rain>=1?'Lluvia activa':rain>=0.1?'Llovizna posible':'Sin precipitación';
  document.getElementById('c-wind').textContent=wind;
  document.getElementById('c-wmax').textContent=Math.round(meteo.daily.windspeed_10m_max[0]);
  document.getElementById('c-temp').textContent=temp+'°';
  document.getElementById('c-temp-s').textContent='Máx '+Math.round(meteo.daily.temperature_2m_max[0])+'° / Mín '+Math.round(meteo.daily.temperature_2m_min[0])+'°';

  // week row (single, no duplicate)
  const weekEl=document.getElementById('week-row');weekEl.innerHTML='';
  meteo.daily.time.slice(0,7).forEach((dateStr,idx)=>{
    const maxT=Math.round(meteo.daily.temperature_2m_max[idx]);
    const minT=Math.round(meteo.daily.temperature_2m_min[idx]);
    const r2=(meteo.daily.precipitation_sum[idx]??0);
    const w2=Math.round(meteo.daily.windspeed_10m_max[idx]);
    const wm2=meteo.daily.weathercode[idx];
    const dv=getVerdict((maxT+minT)/2,r2,w2);
    const lbl=shortDay(dateStr,idx);
    const tod=idx===0;
    const wd=document.createElement('div');
    wd.className='wd'+(tod?' today':'');
    wd.innerHTML=`<span class="wd-name">${lbl}</span><div class="wd-icon-wrap">${wmoEmoji(wm2)}</div><div class="wd-dot ${dv.key}"></div><span class="wd-temp">${maxT}°</span>`;
    wd.addEventListener('click',()=>openDayPhrase(lbl,( maxT+minT)/2,r2,w2));
    weekEl.appendChild(wd);
  });

  // hourly
  const hourlyEl=document.getElementById('hourly');hourlyEl.innerHTML='';
  meteo.hourly.time.forEach((t,i)=>{
    if(!t.startsWith(todayStr))return;
    const h=new Date(t).getHours();
    const isNow=h===hour;
    const tp=Math.round(meteo.hourly.temperature_2m[i]);
    const rn=meteo.hourly.precipitation[i]??0;
    const div=document.createElement('div');
    div.className='hi'+(isNow?' now':'');
    div.innerHTML=`<span class="hi-time">${isNow?'Ahora':h+'h'}</span><span style="font-size:17px">${rn>0.5?'🌧':rn>0.1?'🌦':'☀️'}</span><span class="hi-temp">${tp}°</span>${rn>0.1?`<span class="hi-rain">${rn.toFixed(1)}mm</span>`:''}`;
    hourlyEl.appendChild(div);
  });

  // sunrise
  const rise=new Date(sun.results.sunrise),set=new Date(sun.results.sunset),now=new Date();
  document.getElementById('sunrise-t').textContent=rise.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('sunset-t').textContent=set.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  const total=set-rise,elapsed=Math.min(Math.max(now-rise,0),total),pct=Math.round((elapsed/total)*100);
  document.getElementById('dl-hours').textContent=(Math.round(total/36000)/100)+' h de luz';
  document.getElementById('dl-fill').style.width=pct+'%';
  document.getElementById('sun-dot').style.left=pct+'%';
}

// ── MODAL ─────────────────────────────────────────────────────────
function buildCityGrid(){
  const g=document.getElementById('city-grid');g.innerHTML='';
  CITIES.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='city-btn'+(activeCity&&activeCity.name===c.name?' active':'');
    btn.innerHTML=`<span class="cf">${c.flag}</span>${c.name}`;
    btn.onclick=()=>{closeModal();loadCity(c);};
    g.appendChild(btn);
  });
}
function openModal(){buildCityGrid();document.getElementById('city-modal').classList.add('open');}
function closeModal(){document.getElementById('city-modal').classList.remove('open');}
function maybeCloseModal(e){if(e.target===document.getElementById('city-modal'))closeModal();}

// ── GEO ───────────────────────────────────────────────────────────
function tryGeo(){
  const btn=document.getElementById('geo-btn');
  btn.classList.add('loading');btn.textContent='Localizando…';
  if(!navigator.geolocation){showErr('Tu navegador no soporta geolocalización.');btn.classList.remove('loading');return;}
  navigator.geolocation.getCurrentPosition(
    async pos=>{
      closeModal();
      const{latitude:lat,longitude:lon}=pos.coords;
      const name=await getCity(lat,lon);
      loadCity({name,lat,lon,flag:'📍'});
      btn.classList.remove('loading');btn.textContent='Usar mi ubicación actual';
    },
    err=>{
      btn.classList.remove('loading');btn.textContent='Usar mi ubicación actual';
      showErr(err.code===1?'Permiso denegado. Elige una ciudad.':'No se pudo obtener la ubicación.');
    },
    {timeout:8000,maximumAge:60000}
  );
}
async function getCity(lat,lon){
  try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);const d=await r.json();return d.address?.city||d.address?.town||d.address?.village||d.address?.county||'Tu ubicación';}
  catch{return'Tu ubicación';}
}

// ── LOAD ──────────────────────────────────────────────────────────
function setLoading(msg){document.getElementById('loading').classList.remove('hidden');document.getElementById('loading-txt').textContent=msg||'Cargando…';}
function hideLoading(){document.getElementById('loading').classList.add('hidden');}
function showErr(msg){const b=document.getElementById('err-bar');b.style.display='block';b.textContent=msg;setTimeout(()=>b.style.display='none',5000);}

async function loadCity(city){
  activeCity=city;
  setLoading('Cargando '+city.name+'…');
  const k=city.lat.toFixed(2)+','+city.lon.toFixed(2);
  try{
    let data=cache[k];
    if(!data){
      const today=toYMD(new Date());
      const[mr,sr]=await Promise.all([
        fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&hourly=temperature_2m,precipitation,windspeed_10m&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max,weathercode&forecast_days=7&timezone=auto`),
        fetch(`https://api.sunrise-sunset.org/json?lat=${city.lat}&lng=${city.lon}&date=${today}&formatted=0`)
      ]);
      if(!mr.ok)throw new Error('meteo');
      data={meteo:await mr.json(),sun:await sr.json()};
      cache[k]=data;
    }
    render(data.meteo,data.sun,city.name);
    hideLoading();
    window.scrollTo({top:0,behavior:'smooth'});
  }catch(e){hideLoading();showErr('Error cargando datos para '+city.name+'.');console.error(e);}
}

// ── INIT ──────────────────────────────────────────────────────────
async function init(){
  buildCityGrid();
  if(navigator.geolocation){
    setLoading('Obteniendo ubicación…');
    navigator.geolocation.getCurrentPosition(
      async pos=>{
        const{latitude:lat,longitude:lon}=pos.coords;
        const name=await getCity(lat,lon);
        loadCity({name,lat,lon,flag:'📍'});
      },
      ()=>{hideLoading();openModal();},
      {timeout:7000,maximumAge:120000}
    );
  }else{hideLoading();openModal();}
}
init();
</script>
